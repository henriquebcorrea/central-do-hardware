<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect x="150" y="80" width="100" height="140" fill="#222"/>
  <!-- Heatpipes -->
  <path d="M 170 80 L 170 220 M 185 80 L 185 220 M 200 80 L 200 220 M 215 80 L 215 220 M 230 80 L 230 220" stroke="#cd7f32" stroke-width="4"/>
  <!-- Fins -->
  <g stroke="#999" stroke-width="1">
    <line x1="140" y1="90" x2="260" y2="90"/>
    <line x1="140" y1="100" x2="260" y2="100"/>
    <line x1="140" y1="110" x2="260" y2="110"/>
    <line x1="140" y1="120" x2="260" y2="120"/>
    <line x1="140" y1="130" x2="260" y2="130"/>
    <line x1="140" y1="140" x2="260" y2="140"/>
    <line x1="140" y1="150" x2="260" y2="150"/>
    <line x1="140" y1="160" x2="260" y2="160"/>
    <line x1="140" y1="170" x2="260" y2="170"/>
    <line x1="140" y1="180" x2="260" y2="180"/>
    <line x1="140" y1="190" x2="260" y2="190"/>
    <line x1="140" y1="200" x2="260" y2="200"/>
    <line x1="140" y1="210" x2="260" y2="210"/>
  </g>
  <!-- Fan -->
  <circle cx="200" cy="150" r="50" fill="rgba(0, 0, 0, 0.5)" stroke="url(#rgb)" stroke-width="3"/>
  <circle cx="200" cy="150" r="15" fill="#111"/>
  <defs>
    <linearGradient id="rgb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0000" />
      <stop offset="33%" stop-color="#00ff00" />
      <stop offset="66%" stop-color="#0000ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>
  </defs>
  <text x="200" y="60" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">Air Cooler</text>
</svg>
